<svg id="svg-map" xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
      <!-- fondo redondeado verde teal -->
      <rect width="160" height="160" rx="36" fill="#1D9E75"/>
      <!-- cuadrícula sutil del mapa -->
      <line x1="0" y1="53" x2="160" y2="53" stroke="white" stroke-width="0.6" opacity="0.12"/>
      <line x1="0" y1="106" x2="160" y2="106" stroke="white" stroke-width="0.6" opacity="0.12"/>
      <line x1="53" y1="0" x2="53" y2="160" stroke="white" stroke-width="0.6" opacity="0.12"/>
      <line x1="106" y1="0" x2="106" y2="160" stroke="white" stroke-width="0.6" opacity="0.12"/>
      <!-- cuerpo del pin: círculo exterior difuso -->
      <circle cx="80" cy="66" r="34" fill="white" opacity="0.12"/>
      <!-- aro del pin -->
      <circle cx="80" cy="66" r="22" fill="none" stroke="white" stroke-width="5" opacity="0.9"/>
      <!-- punto central del pin -->
      <circle cx="80" cy="66" r="8" fill="white"/>
      <!-- cola del pin -->
      <path d="M80 88 L64 118 Q80 108 96 118 Z" fill="white"/>
      <!-- cruz hospitalaria pequeña sobre el punto -->
      <rect x="77" y="60" width="6" height="12" rx="1.5" fill="#1D9E75"/>
      <rect x="74" y="63" width="12" height="6" rx="1.5" fill="#1D9E75"/>
    </svg>