<!DOCTYPE html>
<html lang="fr" class="building-labels-hidden">
  <head>
    <title>sotero_map</title>
    <link
      rel="icon"
      href="assets/favicon.ico"
    />
    <meta charset="UTF-8" />

    <!--Disable unwanted scaling of the page and set it to its actual size-->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <link rel="stylesheet" href="index.css?v=20260608b" />

    <script src="lib/jquery/jquery-3.6.0.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@app/index": "./index.js?v=20260608b",
          "@app/campusSelector": "./components/campusSelector.js?v=20260608b",
          "@app/findByUrl": "./utils/findByUrl.js?v=20260608b",
          "@app/routePlanner": "./components/routePlanner.js?v=20260608b",
          "@app/featureDisplay": "./views/featureDisplay.js?v=20260608b",
          "@app/goToCampus": "./utils/goToCampus.js?v=20260608b",
          "@app/soteroSearchMetadata": "./utils/soteroSearchMetadata.js?v=20260608b",
          "@app/addData": "./utils/addData.js?v=20260608b",
          "@app/autocompleteSearchBox": "./components/autocompleteSearchBox.js?v=20260608b",
          "@app/manualBuildingEditor": "./components/manualBuildingEditor.js?v=20260608b",
          "@app/sessionModeBadge": "./components/sessionModeBadge.js?v=20260608b",
          "@app/buildingGeometryEditor": "./components/buildingGeometryEditor.js?v=20260608b",
          "@app/walkingRouteEditor": "./components/walkingRouteEditor.js?v=20260608b",
          "@app/walkingRouteLayer": "./components/walkingRouteLayer.js?v=20260608b",
          "@app/adminMapToolsPanel": "./components/adminMapToolsPanel.js?v=20260608b"
        }
      }
    </script>
    <script type="module">
      import "@app/index";
    </script>
  </head>

  <body>
    <div id="map-status-panel" data-backend-state="loading" data-pending-changes="false">
      <div class="backend-status-header">
        <div class="backend-status-title-row">
          <span id="backend-status-indicator" class="backend-status-indicator"></span>
          <div>
            <div id="backend-status-text" class="backend-status-subtitle backend-status-inline">Consultando estado...</div>
          </div>
        </div>
        <div class="backend-status-actions">
          <button id="backend-refresh-button" type="button" class="backend-refresh-button" data-backend-refresh hidden>
            Actualizar mapa
          </button>
          <button id="backend-export-backup-button" type="button" class="backend-refresh-button backend-export-backup-button" data-backend-export hidden>
            Guardar respaldo
          </button>
        </div>
      </div>
      <div class="backend-status-body">
        <div class="backend-status-line">
          <span class="backend-status-label">Version</span>
          <span id="backend-version">Sin datos</span>
        </div>
        <div class="backend-status-line">
          <span class="backend-status-label">BDD</span>
          <span id="backend-last-change">Sin registros</span>
        </div>
        <div id="backend-sync-message" class="backend-status-message">No hay actualizaciones pendientes.</div>
      </div>
    </div>

    <div id="map">
      <div id="top-container">
        <div id="searchContainer"></div>
        <div id="top-actions">
          <div id="custom-select">
            <select id="campus-select">
              <option value="">Campus</option>
            </select>
          </div>
          <button id="route-planner-toggle" class="dashboard-link route-planner-toggle" type="button" aria-expanded="false">
            &iquest;A donde quieres ir?
          </button>
          <div id="route-planner-panel" class="route-planner-panel" hidden>
            <div class="route-planner-title">Ruta entre edificios</div>
            <label class="route-planner-field" for="route-origin-search">
              <span>Estoy en</span>
              <div class="route-building-combobox">
                <input id="route-origin-search" class="route-planner-search" type="search" placeholder="Buscar y seleccionar edificio..." autocomplete="off" role="combobox" aria-expanded="false" aria-controls="route-origin-options" />
                <input id="route-origin-select" type="hidden" value="" />
                <div id="route-origin-options" class="route-building-options" role="listbox" hidden></div>
              </div>
            </label>
            <label class="route-planner-field" for="route-destination-search">
              <span>Quiero ir a</span>
              <div class="route-building-combobox">
                <input id="route-destination-search" class="route-planner-search" type="search" placeholder="Buscar y seleccionar edificio..." autocomplete="off" role="combobox" aria-expanded="false" aria-controls="route-destination-options" />
                <input id="route-destination-select" type="hidden" value="" />
                <div id="route-destination-options" class="route-building-options" role="listbox" hidden></div>
              </div>
            </label>
            <div class="route-planner-actions">
              <button id="route-planner-submit" class="route-primary-button" type="button">Ir</button>
              <button id="route-planner-clear" class="route-secondary-button" type="button">Limpiar</button>
            </div>
            <div id="route-planner-status" class="route-planner-status">Selecciona origen y destino.</div>
          </div>
        </div>
      </div>
      <div id="buttons-container">
        <div id="floorButtons-container">
          <button id="bLoc" class="floorButton">&target;</button>
        </div>
      </div>
    </div>
  </body>
</html>
